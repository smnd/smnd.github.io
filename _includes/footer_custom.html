{%- if site.footer_content -%}
<p class="text-small text-grey-dk-100 mb-0">{{ site.footer_content }}</p>
{%- endif -%}

<script>
(function(){
  var KEY='jtd-theme';
  var ORDER=['light','dark','system'];
  var mq=window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
  function sys(){ return mq && mq.matches ? 'dark' : 'light'; }
  function pref(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } }
  function set(v){ try{ localStorage.setItem(KEY, v); }catch(e){} }
  function resolve(mode){ return mode === 'system' ? sys() : mode; }
  function iconFor(m){
    if(m === 'dark') return 'dark_mode';
    if(m === 'light') return 'light_mode';
    return 'brightness_auto';
  }

  function apply(mode){
    var resolved = resolve(mode);
    var lightLink = document.getElementById('theme-light');
    var darkLink = document.getElementById('theme-dark');
    /* Enable target before disabling the other, no moment with no theme */
    if(resolved === 'dark'){
      if(darkLink) darkLink.media = 'all';
      if(lightLink) lightLink.media = 'not all';
    } else {
      if(lightLink) lightLink.media = 'all';
      if(darkLink) darkLink.media = 'not all';
    }
    var btn = document.getElementById('theme-toggle');
    if(btn) btn.textContent = iconFor(mode);
  }

  /* Set initial icon and stylesheet state */
  apply(pref() || 'system');

  /* Wire up toggle button: cycle light -> dark -> system -> light */
  var btn = document.getElementById('theme-toggle');
  if(btn){
    btn.addEventListener('click', function(){
      var current = pref() || 'system';
      var idx = ORDER.indexOf(current);
      var next = ORDER[(idx + 1) % ORDER.length];
      set(next);
      apply(next);
    });
  }

  /* Listen for OS theme changes when in system mode (or unset) */
  if(mq && mq.addEventListener){
    mq.addEventListener('change', function(){
      var current = pref() || 'system';
      if(current === 'system') apply(current);
    });
  }

  /* Re-apply on back/forward navigation */
  window.addEventListener('pageshow', function(){ apply(pref() || 'system'); });
})();
</script>
